version: "3"

tasks:
  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check src/

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format src/

  format:check:
    desc: Check formatting without changes
    cmds:
      - uv run ruff format --check src/

  test:
    desc: Run all tests
    cmds:
      - uv run pytest tests/unit tests/integration tests/parity

  test:unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test:integration:
    desc: Run integration tests (requires Docker)
    cmds:
      - uv run pytest tests/integration

  test:load:
    desc: Run load test (requires running app — task dev)
    cmds:
      - mkdir -p tests/load/results
      - >
        uv run locust
        -f tests/load/locustfile.py
        --host {{.NLDI_TEST_URL}}
        --users 20
        --spawn-rate 5
        --run-time 2m
        --headless
        --csv tests/load/results/report
        --html tests/load/results/report.html
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'

  test:parity:
    desc: Run parity tests (requires running app — task dev)
    cmds:
      - uv run pytest tests/parity -m parity -v
    env:
      NLDI_TEST_URL: "{{.NLDI_TEST_URL}}"
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'

  test:system:
    desc: Run system tests (requires running app — task dev)
    cmds:
      - uv run pytest tests/system -m system -v
    env:
      NLDI_TEST_URL: "{{.NLDI_TEST_URL}}"
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'

  typecheck:
    desc: Run type checker
    cmds:
      - uv run ty check src/

  dev:
    desc: Run app locally with decrypted secrets from ~/.secrets/nldi.env.gpg
    cmds:
      - env $(gpg --quiet --decrypt ~/.secrets/nldi.env.gpg | xargs) uv run uvicorn nldi.asgi:app --reload

  check:
    desc: Pre-commit gate — lint, format check, unit tests
    cmds:
      - task: lint
      - task: format:check
      - task: test:unit
