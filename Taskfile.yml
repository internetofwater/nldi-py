version: "3"

vars:
  REGISTRY: ghcr.io/internetofwater/nldi-py
  TAG: '{{.TAG | default "alpha"}}'

tasks:
  docker:build:
    desc: Build Docker image locally (single platform, no push)
    cmds:
      - docker build -t {{.REGISTRY}}:{{.TAG}} .

  docker:push:
    desc: Build and push multi-platform image to ghcr.io (requires docker login)
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 --tag {{.REGISTRY}}:{{.TAG}} --push .

  lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check src/

  format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format src/

  format:check:
    desc: Check formatting without changes
    cmds:
      - uv run ruff format --check src/

  test:
    desc: Run all tests
    cmds:
      - uv run pytest tests/unit tests/integration # tests/parity

  test:unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit

  test:integration:
    desc: Run integration tests (requires Docker)
    cmds:
      - uv run pytest tests/integration

  test:load:
    desc: Run load test (requires running app — task dev)
    cmds:
      - mkdir -p tests/load/results
      - >
        uv run locust
        -f tests/load/locustfile.py
        --host {{.NLDI_TEST_URL}}
        --users 20
        --spawn-rate 5
        --run-time {{.DURATION}}
        --headless
        --csv tests/load/results/report
        --html tests/load/results/report.html
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'
      DURATION: '{{.DURATION | default "5m"}}'

  test:parity:
    desc: Run parity tests (requires running app — task dev)
    cmds:
      - uv run pytest tests/parity -m parity -v
    env:
      NLDI_TEST_URL: "{{.NLDI_TEST_URL}}"
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'

  test:system:
    desc: Run system tests (requires running app — task dev)
    cmds:
      - uv run pytest tests/system -m system -v
    env:
      NLDI_TEST_URL: "{{.NLDI_TEST_URL}}"
    vars:
      NLDI_TEST_URL: '{{.NLDI_TEST_URL | default "http://localhost:8000/api/nldi"}}'

  typecheck:
    desc: Run type checker
    cmds:
      - uv run ty check src/

  dev:docker:
    desc: Run pulled image with decrypted secrets (equivalent of dev task but containerized)
    cmds:
      - gpg --quiet --decrypt ~/.secrets/nldi.env.gpg | sed 's/^\([^=]*\)="\(.*\)"$/\1=\2/' > ~/.secrets/nldi.tmp
      - docker run --rm --env-file ~/.secrets/nldi.tmp -p 8000:8080 ghcr.io/internetofwater/nldi-py:{{.TAG}}
      - rm -f ~/.secrets/nldi.tmp
    vars:
      TAG: '{{.TAG | default "alpha"}}'

  dev:
    desc: Run app locally with decrypted secrets from ~/.secrets/nldi.env.gpg
    cmds:
      - env $(gpg --quiet --decrypt ~/.secrets/nldi.env.gpg | xargs) uv run uvicorn nldi.asgi:app --reload --timeout-graceful-shutdown 5 

  check:
    desc: Pre-commit gate — lint, format check, unit tests
    cmds:
      - task: lint
      - task: format:check
      - task: test:unit
